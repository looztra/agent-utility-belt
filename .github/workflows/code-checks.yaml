---
name: Code checks
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}-checks
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout current branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: ${{ vars.MISE_CACHE_ENABLED || 'true' }}
          cache_key_prefix: ${{ vars.MISE_CACHE_KEY_PREFIX || 'mise-v0' }}
          version: ${{ vars.MISE_VERSION }}

      - name: Run pre-commit checks
        run: |
          echo "::group::Run pre-commit checks"
          mise run precommit:run
          echo "::endgroup::"
